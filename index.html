<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Cocos Creator | seika-stack-cocos</title>
  <meta name="viewport"
        content="width=device-width,user-scalable=no,initial-scale=1,minimum-scale=1,maximum-scale=1,minimal-ui=true"/>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="format-detection" content="telephone=no">
  <meta name="renderer" content="webkit"/>
  <meta name="force-rendering" content="webkit"/>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1"/>
  <meta name="msapplication-tap-highlight" content="no">
  <meta name="full-screen" content="yes"/>
  <meta name="x5-fullscreen" content="true"/>
  <meta name="360-fullscreen" content="true"/>
  <meta name="x5-page-mode" content="app">

  <link rel="stylesheet" type="text/css" href="style.css"/>

  <!-- ===== PC / 横屏 9:16 适配（在引擎读取之前执行）===== -->
  <script>
    (function() {
      var RATIO = 9 / 16; // 宽:高

      function calcSize() {
        var vw = window.innerWidth;
        var vh = window.innerHeight;
        if (vw > vh * RATIO) {
          return { w: Math.floor(vh * RATIO), h: vh };
        } else {
          return { w: vw, h: Math.floor(vw / RATIO) };
        }
      }

      function applySize() {
        var s = calcSize();
        var container = document.getElementById('Cocos3dGameContainer');
        var cv = document.getElementById('GameCanvas');
        if (container) {
          container.style.width = s.w + 'px';
          container.style.height = s.h + 'px';
        }
        if (cv) {
          cv.style.width = s.w + 'px';
          cv.style.height = s.h + 'px';
          cv.width = s.w;
          cv.height = s.h;
        }
        return s;
      }

      // DOM Ready 后立即锁定尺寸
      function initLock() {
        var cv = document.getElementById('GameCanvas');
        if (!cv) return;

        // 先设置正确尺寸
        var s = applySize();

        // 用 Object.defineProperty 锁定 canvas 的 width/height
        // 让 Cocos 引擎无法通过赋值改变画布物理像素尺寸
        var _w = s.w, _h = s.h;
        Object.defineProperty(cv, 'width', {
          configurable: true,
          enumerable: true,
          get: function() { return _w; },
          set: function(v) {
            /* 拒绝引擎修改，保持锁定 */
            console.log('[PCAdapter] blocked canvas.width = ' + v);
          }
        });
        Object.defineProperty(cv, 'height', {
          configurable: true,
          enumerable: true,
          get: function() { return _h; },
          set: function(v) {
            /* 拒绝引擎修改 */
            console.log('[PCAdapter] blocked canvas.height = ' + v);
          }
        });

        // 窗口resize时重新计算并解锁→重设→再锁定
        window.addEventListener('resize', function() {
          var ns = calcSize();
          // 临时解锁
          delete cv.width;
          delete cv.height;
          // 重设
          cv.style.width = ns.w + 'px';
          cv.style.height = ns.h + 'px';
          cv.width = ns.w;
          cv.height = ns.h;
          _w = ns.w;
          _h = ns.h;
          // 重新锁定
          Object.defineProperty(cv, 'width', {
            configurable: true, enumerable: true,
            get: function() { return _w; },
            set: function(v) {}
          });
          Object.defineProperty(cv, 'height', {
            configurable: true, enumerable: true,
            get: function() { return _h; },
            set: function(v) {}
          });
          var container = document.getElementById('Cocos3dGameContainer');
          if (container) {
            container.style.width = ns.w + 'px';
            container.style.height = ns.h + 'px';
          }
        });

        console.log('[PCAdapter] canvas locked at ' + s.w + 'x' + s.h);
      }

      // 尽早执行
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initLock);
      } else {
        initLock();
      }
    })();
  </script>
</head>
<body>
  <div id="GameDiv">
    <div id="Cocos3dGameContainer">
      <canvas id="GameCanvas" oncontextmenu="event.preventDefault()" tabindex="99"></canvas>
    </div>
  </div>

<script src="src/polyfills.bundle.js" charset="utf-8"> </script>
<script src="src/system.bundle.js" charset="utf-8"> </script>
<script src="src/import-map.json" type="systemjs-importmap" charset="utf-8"> </script>

<script>
    System.import('./index.js').catch(function(err) { console.error(err); })
</script>

</body>
</html>
